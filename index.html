<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MCP Template Export</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b0f14;
      --panel: #121821;
      --text: #e6edf3;
      --muted: #9fb0c3;
      --link: #58a6ff;
      --border: #2d3748;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7fafc;
        --panel: #ffffff;
        --text: #1a202c;
        --muted: #4a5568;
        --link: #1d4ed8;
        --border: #e2e8f0;
      }
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    h1, h2 {
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 8px;
      color: var(--muted);
    }
    a {
      color: var(--link);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .lang-links, .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      margin-top: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
    th {
      font-weight: 600;
    }
    .logo {
      width: 20px;
      height: 20px;
      display: inline-block;
      object-fit: contain;
      vertical-align: middle;
      margin-right: 6px;
      border-radius: 4px;
    }
    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="panel">
      <h1>MCP Template Export (Demo)</h1>
      <p>Aggregated template summary from <code>index.json</code>.</p>
      <div class="lang-links">
        <a href="README.md">English README</a>
        <a href="README.zh-CN.md">中文 README</a>
        <a href="README.ja-JP.md">日本語 README</a>
        <a href="README.fr-FR.md">README Français</a>
        <a href="README.backup.md">README Backup</a>
      </div>
    </section>

    <section class="panel">
      <h2>Core Files</h2>
      <div class="quick-links">
        <a href="index.json">index.json</a>
        <a href="templates/">templates/</a>
        <a href="McpTemplateModels.cs">McpTemplateModels.cs</a>
      </div>
    </section>

    <section class="panel">
      <h2>Templates</h2>
      <table>
        <thead>
          <tr>
            <th>key</th>
            <th>display_name</th>
            <th>logo</th>
            <th>description</th>
            <th>category</th>
            <th>homepage</th>
          </tr>
        </thead>
        <tbody id="templates-body">
          <tr><td colspan="6">Loading...</td></tr>
        </tbody>
      </table>
      <div class="status" id="status"></div>
    </section>
  </main>

  <script>
    const body = document.getElementById("templates-body");
    const status = document.getElementById("status");

    function createCell(text) {
      const td = document.createElement("td");
      td.textContent = text ?? "";
      return td;
    }

    async function main() {
      try {
        const response = await fetch("./index.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Failed to load index.json: ${response.status}`);
        }

        const items = await response.json();
        if (!Array.isArray(items)) {
          throw new Error("index.json is not an array");
        }

        body.innerHTML = "";
        for (const item of items) {
          const row = document.createElement("tr");

          row.appendChild(createCell(item.key));
          row.appendChild(createCell(item.display_name));

          const logoCell = document.createElement("td");
          if (item.logo) {
            const img = document.createElement("img");
            img.className = "logo";
            img.src = item.logo;
            img.alt = item.key || "logo";

            const link = document.createElement("a");
            link.href = item.logo;
            link.textContent = item.logo;
            link.target = "_blank";
            link.rel = "noopener noreferrer";

            logoCell.appendChild(img);
            logoCell.appendChild(link);
          }
          row.appendChild(logoCell);

          row.appendChild(createCell(item.description));
          row.appendChild(createCell(item.category));

          const homepageCell = document.createElement("td");
          if (item.homepage) {
            const link = document.createElement("a");
            link.href = item.homepage;
            link.textContent = item.homepage;
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            homepageCell.appendChild(link);
          }
          row.appendChild(homepageCell);

          body.appendChild(row);
        }

        status.textContent = `Loaded ${items.length} items from index.json.`;
      } catch (error) {
        body.innerHTML = "<tr><td colspan=\"6\">Failed to load index.json.</td></tr>";
        status.textContent = String(error);
      }
    }

    main();
  </script>
</body>
</html>
