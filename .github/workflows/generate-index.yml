name: Generate index.json

on:
  push:
    branches:
      - main
    paths:
      - "templates/*.mcp.json"
      - ".github/scripts/generate_index.py"
      - ".github/workflows/generate-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate index.json
        run: python .github/scripts/generate_index.py

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain index.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.json
            git commit -m "chore: auto-generate index.json from templates"
            git push
          else
            echo "index.json is up to date."
          fi
